<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="/css/main.css">
<title>{{ .Title }} · {{ .Site.Title }}</title>
</head>
<body>
{{ partial "header.html" . }}

<main>
  <h1 class="taxonomy">{{ .Title }}</h1>
  {{ range .Data.Terms.ByCount }}
    <a href="{{ .Page.RelPermalink }}" class="tag">{{ .Page.LinkTitle }}</a> <span class="tag">({{ .Count }})</span>
  {{ end }}
</main>

</body>
</html>
