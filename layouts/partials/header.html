<header class="site-header">
  <div class="wrap">
    <a class="brand" href="/">
      {{ with .Site.Params.logo }}
        <img src="{{ . | relURL }}" alt="{{ .Site.Title }}">
      {{ else }}
        {{ .Site.Title }}
      {{ end }}
    </a>
    <nav class="nav">
      <a href="/about">About</a>
    </nav>
  </div>
</header>
