<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="/css/main.css">
<title>{{ .Title }} · {{ .Site.Title }}</title>
{{ partial "header.html" . }}

<main>
  <h1>Tagged: {{ .Title }}</h1>

  {{ range .Pages }}
    <article>
      <h2><a href="{{ .Permalink }}">{{ .Title }}</a></h2>
      <time>{{ .Date.Format "Jan 2, 2006" }}</time>
    </article>
  {{ end }}
</main>
