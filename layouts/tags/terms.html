<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="/css/main.css">
<title>Tags · {{ .Site.Title }}</title>
{{ partial "header.html" . }}

<main>
  <h1>Tags</h1>

  <p>Debug info:</p>
  <pre>{{ printf "%#v" .Site.Taxonomies }}</pre>

  <p>Tags specifically:</p>
  <pre>{{ printf "%#v" .Site.Taxonomies.tags }}</pre>

  {{ range $name, $taxonomy := .Site.Taxonomies.tags }}
    <p>Tag: {{ $name }} ({{ $taxonomy.Count }})</p>
  {{ end }}
</main>
