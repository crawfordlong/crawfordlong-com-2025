<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="/css/main.css">
<title>Tags · {{ .Site.Title }}</title>
{{ partial "header.html" . }}

<main>
  <h1>Tags</h1>

  {{ range .Site.Taxonomies.tags }}
    <a href="{{ .Page.Permalink }}">{{ .Page.Title }}</a> ({{ .Count }})
  {{ end }}
</main>
